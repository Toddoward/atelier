name: CI
on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest          # Tier 1 — release gate
            required: true
          - os: ubuntu-latest           # Tier 2 — allowed to fail until Phase 15
            required: false
          - os: macos-latest            # Tier 2 — allowed to fail until Phase 15
            required: false
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ !matrix.required }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev libwayland-dev libgtk-3-dev
      - run: cargo build --workspace
      - run: cargo test --workspace
      - run: cargo clippy --workspace -- -D warnings
